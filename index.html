<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growbrix</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0D0D0D;
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  gap: 0;
}

.lbl {
  font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  color: #222; font-weight: 600; margin-bottom: 32px;
}

/* ══ LOGO ══ */
.logo-section {
  width: 100%; max-width: 860px;
  padding: 90px 60px;
  display: flex; flex-direction: column; align-items: center;
  background: #0D0D0D;
  border-bottom: 1px solid #171717;
}

.logo {
  display: flex;
  align-items: center;
  gap: 26px;
}

.wm { display: flex; flex-direction: column; gap: 7px; }

.wm-name {
  font-size: 48px; font-weight: 700;
  color: #FFFFFF; letter-spacing: -2.5px; line-height: 1;
}
.wm-name .brix { color: #ffffff; font-weight: 300; opacity: 0.25; }

.wm-tag {
  font-size: 10px; font-weight: 400;
  letter-spacing: 3.5px; text-transform: uppercase;
  color: #2A2A2A;
}

/* ══ BANNER ══ */
.banner {
  width: 100%; max-width: 860px;
  background: #111111;
  padding: 60px 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 48px;
  position: relative;
  overflow: hidden;
}

/* faint grid lines bg texture */
.banner::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
}

.banner-glow {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 400px; height: 200px;
  background: radial-gradient(ellipse, rgba(180,255,80,0.04) 0%, transparent 70%);
  pointer-events: none;
}

.b-left {
  display: flex; align-items: center; gap: 26px;
  position: relative; z-index: 1;
}

.b-text { display: flex; flex-direction: column; gap: 8px; }

.b-name {
  font-size: 36px; font-weight: 700;
  color: #fff; letter-spacing: -1.5px; line-height: 1;
}
.b-name .brix { font-weight: 300; opacity: 0.25; }

.b-tag {
  font-size: 10px; font-weight: 400;
  letter-spacing: 3px; text-transform: uppercase; color: #282828;
}

.b-right {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 16px;
  position: relative; z-index: 1; flex-shrink: 0;
}

.b-headline {
  font-size: 22px; font-weight: 600;
  color: #fff; letter-spacing: -0.5px;
  text-align: right; line-height: 1.3;
}
.b-headline em {
  font-style: normal;
  color: #C8F542;
}

.b-sub {
  font-size: 11px; font-weight: 400;
  color: #2E2E2E; text-align: right;
  letter-spacing: 1px; line-height: 1.8;
}

.b-pill {
  border: 1px solid #1E1E1E;
  color: #C8F542;
  font-size: 10px; font-weight: 500;
  letter-spacing: 2.5px; text-transform: uppercase;
  padding: 8px 20px; border-radius: 100px;
}
</style>
</head>
<body>

<!-- ══ LOGO ══ -->
<div class="logo-section">
  <div class="lbl">Logo</div>
  <div class="logo">

    <!--
      ICON: Two circles (creator + sponsor) connected by a clean curved path.
      Left circle white, right circle lime. Bridge arc between them.
      Simple, geometric, meaningful.
    -->
    <svg width="82" height="82" viewBox="0 0 82 82" xmlns="http://www.w3.org/2000/svg">
      <!-- Left node — creator -->
      <circle cx="20" cy="41" r="12" fill="none" stroke="#FFFFFF" stroke-width="4"/>
      <circle cx="20" cy="41" r="4" fill="#FFFFFF"/>

      <!-- Right node — sponsor -->
      <circle cx="62" cy="41" r="12" fill="none" stroke="#C8F542" stroke-width="4"/>
      <circle cx="62" cy="41" r="4" fill="#C8F542"/>

      <!-- Connection arc — smooth bridge between the two -->
      <path d="M 32,41 C 41,20 41,20 50,41"
        fill="none" stroke="url(#arcGrad)" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 32,41 C 41,62 41,62 50,41"
        fill="none" stroke="url(#arcGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>

      <defs>
        <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="100%" stop-color="#C8F542"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="wm">
      <div class="wm-name">grow<span class="brix">brix</span></div>
      <div class="wm-tag">Creators × Sponsors</div>
    </div>
  </div>
</div>

<!-- ══ BANNER ══ -->
<div class="banner">
  <div class="banner-glow"></div>

  <div class="b-left">
    <!-- smaller icon -->
    <svg width="58" height="58" viewBox="0 0 82 82" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="41" r="12" fill="none" stroke="#FFFFFF" stroke-width="4"/>
      <circle cx="20" cy="41" r="4" fill="#FFFFFF"/>
      <circle cx="62" cy="41" r="12" fill="none" stroke="#C8F542" stroke-width="4"/>
      <circle cx="62" cy="41" r="4" fill="#C8F542"/>
      <path d="M 32,41 C 41,20 41,20 50,41"
        fill="none" stroke="url(#arcGrad2)" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 32,41 C 41,62 41,62 50,41"
        fill="none" stroke="url(#arcGrad2)" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
      <defs>
        <linearGradient id="arcGrad2" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="100%" stop-color="#C8F542"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="b-text">
      <div class="b-name">grow<span class="brix">brix</span></div>
      <div class="b-tag">Digital Growth & Creator Marketing</div>
    </div>
  </div>

  <div class="b-right">
    <div class="b-pill">Creator Marketing</div>
    <div class="b-headline">Where <em>creators</em><br>meet sponsors.</div>
    <div class="b-sub">Sponsorships built for<br>the creator economy.</div>
  </div>
</div>

</body>
</html>
